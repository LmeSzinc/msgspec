name: Latest Supported Python
description: Fetch the highest minor version of Python used in CI
outputs:
  version:
    description: The highest minor version of Python with a wheel
    value: ${{ steps.python-version.outputs.version }}

runs:
  using: composite
  steps:
  - name: Set latest Python version
    id: python-version
    shell: bash
    run: |-
      echo "version=3.14" >> $GITHUB_OUTPUT
      echo "Python version: 3.14"
